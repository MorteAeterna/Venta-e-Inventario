{% extends 'productos/base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Confirmar eliminación</h5>
            </div>
            <div class="card-body">
                <p>¿Estás seguro que deseas eliminar la categoría:</p>
                <p class="fw-bold fs-5">{{ categoria.nombre }}</p>
                <p class="text-muted">Los productos asociados quedarán sin categoría.</p>
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'lista_categorias' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Sí, eliminar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
